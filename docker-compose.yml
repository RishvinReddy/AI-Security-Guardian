version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: soc_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-n8npassword}
      POSTGRES_DB: ${POSTGRES_DB:-ai_soc}
    volumes:
      - soc_db_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  redis:
    image: redis:alpine
    container_name: soc_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: soc_n8n
    restart: unless-stopped
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-ai_soc}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-n8npassword}
      - N8N_HOST=${SUBDOMAIN:-n8n}.${DOMAIN_NAME:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=${TIMEZONE:-UTC}
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - EXECUTIONS_MODE=queue
    ports:
      - "5678:5678"
    volumes:
      - soc_n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows
    depends_on:
      - postgres
      - redis

  # Optional: Grafana for Dashboard
  grafana:
    image: grafana/grafana-oss:latest
    container_name: soc_dashboard
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    ports:
      - "3000:3000"
    volumes:
      - soc_grafana_data:/var/lib/grafana

volumes:
  soc_db_data:
  soc_n8n_data:
  soc_grafana_data:
