        \ || [];\nconst compliance = { mappings: [] };\n\nfindings.forEach(f => {\n\
        \    compliance.mappings.push({\n        finding: f.name || f.hash,\n    \
        \    frameworks: [\n            { name: \"OWASP\", control: \"A05\" },\n \
        \           { name: \"CIS\", control: \"9.2\" },\n            { name: \"NIST\
        \ CSF\", control: \"PR.DS\" }\n        ]\n    });\n});\n\nglobalJson.compliance\
        \ = compliance;\nreturn globalJson;\n"
