    parameters:
      jsCode: "\nconst globalJson = $json;\nconst findings = globalJson.vulnerabilities\
        \ || [];\nglobalJson.incident = {\n    title: `Incident: Multiple Findings\
        \ on ${globalJson.TARGET_DOMAIN}`,\n    finding_count: findings.length,\n\
        \    related_findings: findings.map(f => f.hash || f.name)\n};\nreturn globalJson;\n"
