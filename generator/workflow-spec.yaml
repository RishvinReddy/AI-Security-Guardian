name: AI Security Guardian Mega Workflow
sections:
- id: 1
  name: 01 Trigger Layer
  color: 7
  manual_wiring: true
  nodes:
  - name: Trigger_Webhook
    type: n8n-nodes-base.webhook
    entrypoint: true
    x: 0
    y: 0
    parameters:
      path: scan-trigger
      options: {}
    connections:
      main:
      - - node: CODE_TriggerRouter
          type: main
          index: 0
  - name: Trigger_GitHub
    type: n8n-nodes-base.githubTrigger
    entrypoint: true
    x: 0
    y: 150
    parameters:
      events:
      - push
    connections:
      main:
      - - node: CODE_TriggerRouter
          type: main
          index: 0
  - name: Trigger_Schedule
    type: n8n-nodes-base.cron
    entrypoint: true
    x: 0
    y: 300
    parameters:
      triggerTimes:
        item:
        - mode: everyDay
          hour: 2
    connections:
      main:
      - - node: CODE_TriggerRouter
          type: main
          index: 0
  - name: Trigger_Manual
    type: n8n-nodes-base.manualTrigger
    entrypoint: true
    x: 0
    y: 450
    parameters: {}
    connections:
      main:
      - - node: CODE_TriggerRouter
          type: main
          index: 0
  - name: CODE_TriggerRouter
    type: n8n-nodes-base.code
    exitpoint: true
    x: 400
    y: 200
    parameters:
      jsCode: "\nconst source = $node.Trigger_Webhook ? 'Webhook' : \n           \
        \    $node.Trigger_GitHub ? 'GitHub' : \n               $node.Trigger_Schedule\
        \ ? 'Schedule' : 'Manual';\n               \nreturn {\n    trigger: {\n  \
        \      source: source,\n        timestamp: new Date().toISOString(),\n   \
        \     initiated_by: 'system'\n    }\n};\n"
    connections: {}
- id: 2
  name: 02 Configuration
  color: 6
  nodes:
  - name: CRON_Trigger
    type: n8n-nodes-base.scheduleTrigger
    parameters:
      rule:
        interval:
        - field: days
          daysInterval: 1
  - name: CFG_Configuration
    type: n8n-nodes-base.set
    parameters:
      values:
        string:
        - name: TARGET_DOMAIN
          value: example.com
        - name: SCAN_PROFILE
          value: Standard
        - name: OPENAI_MODEL
          value: gpt-4o
        boolean:
        - name: ENABLE_NMAP
          value: true
        - name: ENABLE_NUCLEI
          value: true
        - name: ENABLE_SSL
          value: true
        - name: ENABLE_HEADERS
          value: true
        - name: ENABLE_AI
          value: true
        - name: ENABLE_NVD
          value: true
        - name: ENABLE_EPSS
          value: true
        - name: ENABLE_KEV
          value: true
        - name: ENABLE_SHODAN
          value: false
        - name: ENABLE_VIRUSTOTAL
          value: true
        - name: ENABLE_GREYNOISE
          value: false
        - name: ENABLE_ABUSEIPDB
          value: false
        number:
        - name: TIMEOUT
          value: 60
        - name: RETRY
          value: 3
        - name: PARALLEL_LIMIT
          value: 5
        - name: TTL_NVD
          value: 604800
        - name: TTL_EPSS
          value: 86400
        - name: TTL_KEV
          value: 86400
        - name: TTL_SHODAN
          value: 43200
        - name: TTL_VIRUSTOTAL
          value: 43200
        - name: TTL_GREYNOISE
          value: 21600
        - name: TTL_ABUSEIPDB
          value: 86400
- id: 3
  name: 03 Asset Inventory
  color: 2
  manual_wiring: true
  nodes:
  - name: DB_LoadAssetCMDB
    type: n8n-nodes-base.postgres
    entrypoint: true
    continueOnFail: true
    credentials:
      postgres:
        id: ''
        name: Postgres account
    x: 0
    y: 200
    parameters:
      operation: executeQuery
      query: SELECT * FROM assets WHERE domain = '{{ $('CFG_Configuration').item.json.TARGET_DOMAIN
        }}' LIMIT 1
    connections:
      main:
      - - node: CODE_AttachAssetContext
          type: main
          index: 0
  - name: CODE_AttachAssetContext
    type: n8n-nodes-base.code
    exitpoint: true
    x: 400
    y: 200
    parameters:
      jsCode: "\n// Merge the trigger data, config data, and CMDB data into the global\
        \ payload\nconst config = $items(\"CFG_Configuration\")[0].json;\nconst cmdb\
        \ = $json || { domain: config.TARGET_DOMAIN, environment: 'Unknown', criticality:\
        \ 'Medium' };\n\nreturn {\n    ...config,\n    asset_context: cmdb\n};\n"
    connections: {}
- id: 4
  name: 04 Asset Discovery
  color: 1
  nodes:
  - name: HTTP_Subfinder
    type: n8n-nodes-base.httpRequest
    continueOnFail: true
    parameters:
      url: https://api.subfinder.example/v1?domain={{ $('CFG_Configuration').item.json.TARGET_DOMAIN
        }}
  - name: HTTP_WHOIS
    type: n8n-nodes-base.httpRequest
    continueOnFail: true
    parameters:
      url: https://api.whois.example/v1?domain={{ $('CFG_Configuration').item.json.TARGET_DOMAIN
        }}
- id: 5
  name: 05 DNS
  color: 1
  nodes:
  - name: HTTP_CloudflareDNS
    type: n8n-nodes-base.httpRequest
    continueOnFail: true
    parameters:
      url: https://cloudflare-dns.com/dns-query?name={{ $('CFG_Configuration').item.json.TARGET_DOMAIN
        }}&type=A
      sendHeaders: true
      headerParameters:
        parameters:
        - name: accept
          value: application/dns-json
  - name: HTTP_ReverseDNS
    type: n8n-nodes-base.httpRequest
    continueOnFail: true
- id: 6
  name: 06 Attack Surface
  color: 2
  nodes:
  - name: CMD_Nmap
    type: n8n-nodes-base.executeCommand
    continueOnFail: true
    parameters:
      command: nmap -Pn -F {{ $('CFG_Configuration').item.json.TARGET_DOMAIN }} -oX
        -
  - name: HTTP_SSL
    type: n8n-nodes-base.httpRequest
    continueOnFail: true
    parameters:
      url: https://{{ $('CFG_Configuration').item.json.TARGET_DOMAIN }}
      options:
        allowUnauthorizedCerts: true
        fullResponse: true
  - name: HTTP_Headers
    type: n8n-nodes-base.httpRequest
    continueOnFail: true
    parameters:
      url: https://{{ $('CFG_Configuration').item.json.TARGET_DOMAIN }}
- id: 7
  name: 07 Vulnerability Scanning
  color: 3
  nodes:
  - name: CMD_Nuclei
    type: n8n-nodes-base.executeCommand
    continueOnFail: true
    parameters:
      command: nuclei -u https://{{ $('CFG_Configuration').item.json.TARGET_DOMAIN
        }} -json
  - name: CMD_Trivy
    type: n8n-nodes-base.executeCommand
    continueOnFail: true
  - name: CMD_ZAP_Passive
    type: n8n-nodes-base.executeCommand
    continueOnFail: true
- id: 8
  name: 08 Cloud Security
  color: 3
  manual_wiring: true
  nodes:
  - name: Cloud_AWS_Prowler
    type: n8n-nodes-base.executeCommand
    entrypoint: true
    x: 0
    y: 0
    parameters:
      command: echo 'Mock AWS Prowler scan' && cat examples/mock_prowler.json || echo
        '{}'
    connections:
      main:
      - - node: CODE_CloudNormalizer
          type: main
          index: 0
  - name: Cloud_Azure_API
    type: n8n-nodes-base.httpRequest
    entrypoint: true
    x: 0
    y: 150
    parameters:
      url: https://management.azure.com/mock
      method: GET
    connections:
      main:
      - - node: CODE_CloudNormalizer
          type: main
          index: 0
  - name: Cloud_GCP_API
    type: n8n-nodes-base.httpRequest
    entrypoint: true
    x: 0
    y: 300
    parameters:
      url: https://mock.googleapis.com
      method: GET
    connections:
      main:
      - - node: CODE_CloudNormalizer
          type: main
          index: 0
  - name: CODE_CloudNormalizer
    type: n8n-nodes-base.code
    exitpoint: true
    x: 400
    y: 150
    parameters:
      jsCode: "\n// Mock normalization\nconst globalJson = $items(\"CFG_Configuration\"\
        )[0].json;\nglobalJson.cloud_findings = [\n    { provider: 'aws', resource_type:\
        \ 's3', resource_id: 'bucket-1', risk: 'high' }\n];\nreturn globalJson;\n"
    connections: {}
- id: 9
  name: 09 Container Security
  color: 4
  manual_wiring: true
  nodes:
  - name: Container_Trivy_FS
    type: n8n-nodes-base.executeCommand
    entrypoint: true
    x: 0
    y: 0
    parameters:
      command: echo 'Mock Trivy FS scan'
    connections:
      main:
      - - node: CODE_ContainerNormalizer
          type: main
          index: 0
  - name: Container_Trivy_Image
    type: n8n-nodes-base.executeCommand
    entrypoint: true
    x: 0
    y: 150
    parameters:
      command: echo 'Mock Trivy Image scan'
    connections:
      main:
      - - node: CODE_ContainerNormalizer
          type: main
          index: 0
  - name: Container_Trivy_SBOM
    type: n8n-nodes-base.executeCommand
    entrypoint: true
    x: 0
    y: 300
    parameters:
      command: echo 'Mock Trivy SBOM'
    connections:
      main:
      - - node: CODE_ContainerNormalizer
          type: main
          index: 0
  - name: CODE_ContainerNormalizer
    type: n8n-nodes-base.code
    exitpoint: true
    x: 400
    y: 150
    parameters:
      jsCode: "\n// Mock normalization\nconst globalJson = $items(\"CODE_CloudNormalizer\"\
        )[0].json;\nglobalJson.container_findings = [\n    { image_name: 'nginx:latest',\
        \ vulnerabilities: 5, secrets: 1 }\n];\nreturn globalJson;\n"
    connections: {}
- id: 10
  name: 10 Normalizer
  color: 6
  nodes:
  - name: CODE_StandardizeJSON
    type: n8n-nodes-base.code
    parameters:
      jsCode: "return {\n  workflow_metadata: {\n    schema_version: \"2.0\",\n  \
        \  workflow_version: \"1.1.0\",\n    build: \"2026.06.27\",\n    workflow:\
        \ \"AI Security Guardian\",\n    phase: 2,\n    execution_id: $execution.id\n\
        \  },\n  asset: {\n    domain: $('CFG_Configuration').item.json.TARGET_DOMAIN,\n\
        \    fingerprint: $('CFG_Configuration').item.json.TARGET_DOMAIN + \"_\" +\
        \ ($items(\"HTTP_CloudflareDNS\")[0]?.json?.Answer?.[0]?.data || \"noip\"\
        )\n  },\n  evidence: {\n    nmap: $items(\"CMD_Nmap\")[0]?.json || {},\n \
        \   nuclei: $items(\"CMD_Nuclei\")[0]?.json || {},\n    ssl: $items(\"HTTP_SSL\"\
        )[0]?.json || {},\n    headers: $items(\"HTTP_Headers\")[0]?.json || {},\n\
        \    dns: $items(\"HTTP_CloudflareDNS\")[0]?.json || {}\n  },\n  dns: $items(\"\
        HTTP_CloudflareDNS\")[0]?.json || {},\n  ssl: $items(\"HTTP_SSL\")[0]?.json\
        \ || {},\n  headers: $items(\"HTTP_Headers\")[0]?.json || {},\n  ports: ($items(\"\
        CMD_Nmap\")[0]?.json || []).map(p => ({ port: p, confidence: 0.98 })),\n \
        \ vulnerabilities: ($items(\"CMD_Nuclei\")[0]?.json || []).map(v => ({ ...v,\
        \ confidence: 0.95 })),\n  threat_intelligence: {},\n  historical: {},\n \
        \ risk: {},\n  trend: {},\n  ai: {},\n  reports: {},\n  execution: {\n   \
        \ timestamp: new Date().toISOString(),\n    scanner_versions: {\n      nmap:\
        \ \"7.97\",\n      nuclei: \"3.4.0\",\n      trivy: \"0.64\",\n      httpx:\
        \ \"1.7\"\n    },\n    scanners: {\n      nmap: { success: !!$items(\"CMD_Nmap\"\
        )[0], duration: 0 },\n      nuclei: { success: !!$items(\"CMD_Nuclei\")[0],\
        \ duration: 0 }\n    }\n  }\n};\n"
- id: 11
  name: 11 Historical Comparison
  color: 5
  nodes:
  - name: DB_GetPreviousScan
    type: n8n-nodes-base.postgres
    continueOnFail: true
    credentials:
      postgres:
        id: ''
        name: Postgres account
    parameters:
      operation: executeQuery
      query: SELECT score as previous_risk_score FROM risk_scores WHERE asset_id =
        '{{ $('CFG_Configuration').item.json.TARGET_DOMAIN }}' ORDER BY calculated_at
        DESC LIMIT 1;
  - name: CODE_CalculateDelta
    type: n8n-nodes-base.code
    parameters:
      jsCode: "const previousScore = $items(\"DB_GetPreviousScan\")[0]?.json?.previous_risk_score\
        \ || null;\n\n$json = $items(\"CODE_StandardizeJSON\")[0].json;\n$json.historical\
        \ = {\n  previous_risk: previousScore,\n  is_first_scan: previousScore ===\
        \ null,\n  new_ports: [], \n  closed_ports: [],\n  new_cves: [],\n  resolved_cves:\
        \ []\n};\nreturn $json;\n"
- id: 12
  name: 12 Change Detection Engine
  color: 1
  manual_wiring: true
  nodes:
  - name: CODE_ChangeClassifier
    type: n8n-nodes-base.code
    entrypoint: true
    x: 0
    y: 200
    parameters:
      jsCode: "\nconst globalJson = $json;\nconst deltas = globalJson.historical;\n\
        const changes = [];\n\nif (deltas && deltas.new_ports && deltas.new_ports.length\
        \ > 0) {\n    changes.push({ type: 'NEW_EXPOSURE', severity: 'HIGH', confidence:\
        \ 0.98 });\n}\nif (deltas && deltas.new_cves && deltas.new_cves.length > 0)\
        \ {\n    changes.push({ type: 'SECURITY_REGRESSION', severity: 'CRITICAL',\
        \ confidence: 0.95 });\n}\nif (deltas && deltas.resolved_cves && deltas.resolved_cves.length\
        \ > 0) {\n    changes.push({ type: 'REMEDIATION_CONFIRMED', severity: 'LOW',\
        \ confidence: 0.99 });\n}\n\nglobalJson.changes = changes;\nreturn globalJson;\n"
    connections:
      main:
      - - node: CODE_ChangePriority
          type: main
          index: 0
  - name: CODE_ChangePriority
    type: n8n-nodes-base.code
    exitpoint: true
    x: 300
    y: 200
    parameters:
      jsCode: "\nconst globalJson = $json;\nconst assetContext = globalJson.asset_context\
        \ || { criticality: 'Medium' };\n\nglobalJson.changes.forEach(change => {\n\
        \    change.business_impact = assetContext.criticality;\n});\n\nreturn globalJson;\n"
    connections: {}
- id: 13
  name: 13 Threat Intelligence Cache
  color: 4
  manual_wiring: true
  nodes:
  - name: CODE_ExtractFindings
    type: n8n-nodes-base.code
    entrypoint: true
    x: 0
    y: 0
    parameters:
      jsCode: return $json.vulnerabilities || [];
    connections:
      main:
      - - node: IF_NVD
          type: main
          index: 0
        - node: IF_EPSS
          type: main
          index: 0
        - node: IF_KEV
          type: main
          index: 0
        - node: IF_Shodan
          type: main
          index: 0
        - node: IF_VirusTotal
          type: main
          index: 0
        - node: IF_GreyNoise
          type: main
          index: 0
        - node: IF_AbuseIPDB
          type: main
          index: 0
  - name: IF_NVD
    type: n8n-nodes-base.if
    x: 300
    y: -600
    parameters:
      conditions:
        boolean:
        - value1: '{{ $(''CFG_Configuration'').item.json.ENABLE_NVD }}'
          value2: true
    connections:
      main:
      - - node: DB_CacheLookup_NVD
          type: main
          index: 0
      - - node: SKIP_NVD
          type: main
          index: 0
  - name: DB_CacheLookup_NVD
    type: n8n-nodes-base.postgres
    continueOnFail: true
    credentials:
      postgres:
        id: ''
        name: Postgres account
    x: 600
    y: -650
    parameters:
      operation: executeQuery
      query: SELECT * FROM threat_intel_cache WHERE cache_key = $1 AND provider =
        'NVD'
    connections:
      main:
      - - node: IF_CacheValid_NVD
          type: main
          index: 0
  - name: IF_CacheValid_NVD
    type: n8n-nodes-base.if
    x: 900
    y: -650
    parameters:
      conditions:
        boolean:
        - value1: '{{ $json.expires_at > new Date().toISOString() }}'
          value2: true
    connections:
      main:
      - - node: RETURN_CACHE_NVD
          type: main
          index: 0
      - - node: HTTP_NVD
          type: main
          index: 0
  - name: HTTP_NVD
    type: n8n-nodes-base.httpRequest
    continueOnFail: true
    x: 1200
    y: -600
    parameters:
      url: https://api.example.com/nvd
      method: GET
    connections:
      main:
      - - node: IF_ApiSuccess_NVD
          type: main
          index: 0
  - name: IF_ApiSuccess_NVD
    type: n8n-nodes-base.if
    x: 1500
    y: -600
    parameters:
      conditions:
        boolean:
        - value1: '{{ $json.status === ''success'' }}'
          value2: true
    connections:
      main:
      - - node: DB_SaveCache_NVD
          type: main
          index: 0
      - - node: IF_HasStaleCache_NVD
          type: main
          index: 0
  - name: DB_SaveCache_NVD
    type: n8n-nodes-base.postgres
    continueOnFail: true
    credentials:
      postgres:
        id: ''
        name: Postgres account
    x: 1800
    y: -650
    parameters:
      operation: insert
      table: threat_intel_cache
      columns: cache_key, provider, entity_type, response, expires_at
      dataMode: autoMapInputData
    connections:
      main:
      - - node: MERGE_ThreatIntel
          type: main
          index: 0
  - name: IF_HasStaleCache_NVD
    type: n8n-nodes-base.if
    x: 1800
    y: -550
    parameters:
      conditions:
        boolean:
        - value1: '{{ $items(''DB_CacheLookup_NVD'')[0].json.response ? true : false
            }}'
          value2: true
    connections:
      main:
      - - node: RETURN_STALE_NVD
          type: main
          index: 0
      - - node: SKIP_NVD
          type: main
          index: 0
  - name: RETURN_CACHE_NVD
    type: n8n-nodes-base.code
    x: 1200
    y: -750
    parameters:
      jsCode: 'return { provider: ''NVD'', source: ''cache'', data: $json };'
    connections:
      main:
      - - node: MERGE_ThreatIntel
          type: main
          index: 0
  - name: RETURN_STALE_NVD
    type: n8n-nodes-base.code
    x: 2100
    y: -600
    parameters:
      jsCode: 'return { provider: ''NVD'', source: ''stale_cache'', data: $items(''DB_CacheLookup_NVD'')[0].json
        };'
    connections:
      main:
      - - node: MERGE_ThreatIntel
          type: main
          index: 0
  - name: SKIP_NVD
    type: n8n-nodes-base.code
    x: 2100
    y: -500
    parameters:
      jsCode: 'return { provider: ''NVD'', skipped: true };'
    connections:
      main:
      - - node: MERGE_ThreatIntel
          type: main
          index: 0
  - name: IF_EPSS
    type: n8n-nodes-base.if
    x: 300
    y: -250
    parameters:
      conditions:
        boolean:
        - value1: '{{ $(''CFG_Configuration'').item.json.ENABLE_EPSS }}'
          value2: true
    connections:
      main:
      - - node: DB_CacheLookup_EPSS
          type: main
          index: 0
      - - node: SKIP_EPSS
          type: main
          index: 0
  - name: DB_CacheLookup_EPSS
    type: n8n-nodes-base.postgres
    continueOnFail: true
    credentials:
      postgres:
        id: ''
        name: Postgres account
    x: 600
    y: -300
    parameters:
      operation: executeQuery
      query: SELECT * FROM threat_intel_cache WHERE cache_key = $1 AND provider =
        'EPSS'
    connections:
      main:
      - - node: IF_CacheValid_EPSS
          type: main
          index: 0
  - name: IF_CacheValid_EPSS
    type: n8n-nodes-base.if
    x: 900
    y: -300
    parameters:
      conditions:
        boolean:
        - value1: '{{ $json.expires_at > new Date().toISOString() }}'
          value2: true
    connections:
      main:
      - - node: RETURN_CACHE_EPSS
          type: main
          index: 0
      - - node: HTTP_EPSS
          type: main
          index: 0
  - name: HTTP_EPSS
    type: n8n-nodes-base.httpRequest
    continueOnFail: true
    x: 1200
    y: -250
    parameters:
      url: https://api.example.com/epss
      method: GET
    connections:
      main:
      - - node: IF_ApiSuccess_EPSS
          type: main
          index: 0
  - name: IF_ApiSuccess_EPSS
    type: n8n-nodes-base.if
    x: 1500
    y: -250
    parameters:
      conditions:
        boolean:
        - value1: '{{ $json.status === ''success'' }}'
          value2: true
    connections:
      main:
      - - node: DB_SaveCache_EPSS
          type: main
          index: 0
      - - node: IF_HasStaleCache_EPSS
          type: main
          index: 0
  - name: DB_SaveCache_EPSS
    type: n8n-nodes-base.postgres
    continueOnFail: true
    credentials:
      postgres:
        id: ''
        name: Postgres account
    x: 1800
    y: -300
    parameters:
      operation: insert
      table: threat_intel_cache
      columns: cache_key, provider, entity_type, response, expires_at
      dataMode: autoMapInputData
    connections:
      main:
      - - node: MERGE_ThreatIntel
          type: main
          index: 0
  - name: IF_HasStaleCache_EPSS
    type: n8n-nodes-base.if
    x: 1800
    y: -200
    parameters:
      conditions:
        boolean:
        - value1: '{{ $items(''DB_CacheLookup_EPSS'')[0].json.response ? true : false
            }}'
          value2: true
    connections:
      main:
      - - node: RETURN_STALE_EPSS
          type: main
          index: 0
      - - node: SKIP_EPSS
          type: main
          index: 0
  - name: RETURN_CACHE_EPSS
    type: n8n-nodes-base.code
    x: 1200
    y: -400
    parameters:
      jsCode: 'return { provider: ''EPSS'', source: ''cache'', data: $json };'
    connections:
      main:
      - - node: MERGE_ThreatIntel
          type: main
          index: 0
  - name: RETURN_STALE_EPSS
    type: n8n-nodes-base.code
    x: 2100
    y: -250
    parameters:
      jsCode: 'return { provider: ''EPSS'', source: ''stale_cache'', data: $items(''DB_CacheLookup_EPSS'')[0].json
        };'
    connections:
      main:
      - - node: MERGE_ThreatIntel
          type: main
          index: 0
  - name: SKIP_EPSS
    type: n8n-nodes-base.code
    x: 2100
    y: -150
    parameters:
      jsCode: 'return { provider: ''EPSS'', skipped: true };'
    connections:
      main:
      - - node: MERGE_ThreatIntel
          type: main
          index: 0
  - name: IF_KEV
    type: n8n-nodes-base.if
    x: 300
    y: 100
    parameters:
      conditions:
        boolean:
        - value1: '{{ $(''CFG_Configuration'').item.json.ENABLE_KEV }}'
          value2: true
    connections:
      main:
      - - node: DB_CacheLookup_KEV
          type: main
          index: 0
      - - node: SKIP_KEV
          type: main
          index: 0
  - name: DB_CacheLookup_KEV
    type: n8n-nodes-base.postgres
    continueOnFail: true
    credentials:
      postgres:
        id: ''
        name: Postgres account
    x: 600
    y: 50
    parameters:
      operation: executeQuery
      query: SELECT * FROM threat_intel_cache WHERE cache_key = $1 AND provider =
        'KEV'
