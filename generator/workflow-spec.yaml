- id: 21
  name: 21 PostgreSQL & Notifications
  color: 5
  nodes:
  - name: CODE_ExecutionSummary
    type: n8n-nodes-base.code
    parameters:
      jsCode: "$json.execution_summary = {\n  assets_scanned: 1,\n  duration: 94,\n\
        \  findings: $json.vulnerabilities?.length || 0,\n  critical: $json.risk.score\
        \ >= 90 ? 1 : 0,\n  high: $json.risk.score >= 70 && $json.risk.score < 90\
        \ ? 1 : 0,\n  medium: $json.risk.score >= 40 && $json.risk.score < 70 ? 1\
        \ : 0,\n  low: $json.risk.score >= 10 && $json.risk.score < 40 ? 1 : 0,\n\
        \  failed_scanners: []\n};\nreturn $json;\n"
  - name: DB_InsertFindings
    type: n8n-nodes-base.postgres
    continueOnFail: true
    credentials:
      postgres:
        id: ''
        name: Postgres account
    parameters:
      operation: insert
      table: findings
      columns: asset_id, scanner_name, severity, finding_title, finding_details
      dataMode: autoMapInputData
  - name: SWITCH_Severity
    type: n8n-nodes-base.switch
    parameters:
      mode: rules
      rules:
        rules:
        - conditions:
            number:
            - value1: ={{ $json.risk.score }}
              operation: largerEqual
              value2: 90
          output: 0
        - conditions:
            number:
            - value1: ={{ $json.risk.score }}
              operation: largerEqual
              value2: 70
          output: 1
        - conditions:
            number:
            - value1: ={{ $json.risk.score }}
              operation: largerEqual
              value2: 40
          output: 2
        - conditions:
            number:
            - value1: ={{ $json.risk.score }}
              operation: largerEqual
              value2: 10
          output: 3
