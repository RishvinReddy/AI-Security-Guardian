- id: 16
  name: 16 Risk Engine
  color: 7
  nodes:
  - name: CODE_CalculateRisk
    type: n8n-nodes-base.code
    parameters:
      jsCode: "let score = 0;\n// Deterministic Logic: CVSS + EPSS + KEV + Ports +\
        \ SSL + Headers + Exposure\nconst vulns = $json.vulnerabilities || [];\nif\
        \ (vulns.length > 0) score += 40; // Example CVSS weight\nconst ports = $json.ports\
        \ || [];\nif (ports.includes('3389') || ports.includes('22')) score += 15;\
        \ // Risky open ports\nif ($json.ssl && $json.ssl.expired) score += 10;\n\
        if (!$json.headers?.HSTS) score += 5;\n\n// Apply historical penalty if new\
        \ critical port\nif ($json.historical?.new_ports?.includes('3389')) score\
        \ += 20;\n\n// Clamp score 0-100\n$json.risk.score = Math.min(Math.max(score,\
        \ 0), 100);\n\n// Calculate delta now that we have current score\nif ($json.historical.previous_risk\
        \ !== null) {\n  $json.historical.risk_delta = $json.risk.score - $json.historical.previous_risk;\n\
        } else {\n  $json.historical.risk_delta = 0;\n}\nreturn $json;\n"
